name: deploy-ecr-ecs

# Entry point: OIDC role is passed only via repository secret (see reusable workflow).
# See docs/DEPLOYMENT_ECS_FARGATE.md

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region for ECR/ECS
        type: string
        required: true
        default: us-west-1
      ecr_repository:
        description: ECR repository name
        type: string
        required: true
        default: linkage-engine
      ecs_cluster:
        description: ECS cluster name
        type: string
        required: true
        default: linkage-engine-cluster
      ecs_service:
        description: ECS service name
        type: string
        required: true
        default: linkage-engine-service

jobs:
  deploy:
    uses: ./.github/workflows/deploy-ecr-ecs-reusable.yml
    with:
      aws_region: ${{ github.event.inputs.aws_region }}
      ecr_repository: ${{ github.event.inputs.ecr_repository }}
      ecs_cluster: ${{ github.event.inputs.ecs_cluster }}
      ecs_service: ${{ github.event.inputs.ecs_service }}
    # Pass repository secrets into the reusable workflow without repeating secret names in expressions (avoids IDE false positives).
    secrets: inherit
