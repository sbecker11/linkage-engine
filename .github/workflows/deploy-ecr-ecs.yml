name: deploy-ecr-ecs

# Deploys a new application image to ECS Fargate.
#
# Infrastructure (VPC, ALB, RDS, WAF, IAM, etc.) is managed separately by
# Terraform — run "terraform apply" locally from infra/envs/prod/ for infra
# changes. This workflow handles only the application deploy loop:
#   1. Build + push Docker image to ECR.
#   2. Register a new ECS task definition revision (same config, new image).
#   3. Update the ECS service — triggers a rolling replacement of tasks.
#
# The deploy role (AWS_DEPLOY_ROLE_ARN) is intentionally narrow and only
# has ECR push + ECS task/service permissions. No Terraform is run in CI.
# See infra/README.md and docs/DEPLOYMENT_ECS_FARGATE.md

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region for ECR/ECS
        type: string
        required: true
        default: us-west-1
      ecr_repository:
        description: ECR repository name
        type: string
        required: true
        default: linkage-engine
      ecs_cluster:
        description: ECS cluster name
        type: string
        required: true
        default: linkage-engine-cluster
      ecs_service:
        description: ECS service name
        type: string
        required: true
        default: linkage-engine-service
      task_family:
        description: ECS task definition family
        type: string
        required: true
        default: linkage-engine

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION:      ${{ github.event.inputs.aws_region }}
      ECR_REPOSITORY:  ${{ github.event.inputs.ecr_repository }}
      ECS_CLUSTER:     ${{ github.event.inputs.ecs_cluster }}
      ECS_SERVICE:     ${{ github.event.inputs.ecs_service }}
      TASK_FAMILY:     ${{ github.event.inputs.task_family }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          # Also tag as :latest for convenience
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
                     "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Register new ECS task definition and deploy
        env:
          NEW_IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          # Fetch the current (active) task definition JSON.
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query taskDefinition \
            --output json)

          # Replace the image in the first container, strip read-only fields
          # that would be rejected by register-task-definition.
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE
             | del(.taskDefinitionArn, .revision, .status,
                   .requiresAttributes, .compatibilities,
                   .registeredAt, .registeredBy)')

          # Register the new revision.
          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query taskDefinition.taskDefinitionArn \
            --output text)

          echo "Registered task definition: $NEW_TASK_ARN"

          # Update the service to use the new revision (rolling deploy).
          # --desired-count 1 ensures the service is running even if it was
          # previously scaled to 0 (e.g. after a manual scale-down).
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$NEW_TASK_ARN" \
            --desired-count 1 \
            --force-new-deployment

          echo "Deployment triggered for $ECS_CLUSTER / $ECS_SERVICE"
