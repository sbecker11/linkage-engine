name: deploy-ecr-ecs

# Infrastructure is managed by Terraform (infra/envs/prod/).
# This workflow:
#   1. Builds and pushes the Docker image to ECR.
#   2. Runs "terraform apply" to update the ECS task definition with the new
#      image tag and trigger a rolling deployment — no separate ECS deploy step.
#
# OIDC role:  repository secret AWS_DEPLOY_ROLE_ARN (never a workflow input).
# AWS region: workflow_dispatch default (us-west-1); override per run in UI.
# See infra/README.md and docs/DEPLOYMENT_ECS_FARGATE.md

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region for ECR/ECS
        type: string
        required: true
        default: us-west-1
      ecr_repository:
        description: ECR repository name
        type: string
        required: true
        default: linkage-engine

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ github.event.inputs.aws_region }}
      ECR_REPOSITORY: ${{ github.event.inputs.ecr_repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform init
        working-directory: infra/envs/prod
        run: terraform init -input=false

      - name: Terraform apply (update ECS image tag)
        working-directory: infra/envs/prod
        run: |
          terraform apply -auto-approve -input=false \
            -var="ecr_image_uri=${{ steps.build-image.outputs.image }}" \
            -var="aws_account_id=$(aws sts get-caller-identity --query Account --output text)"
