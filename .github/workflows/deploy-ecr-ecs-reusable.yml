# Called by deploy-ecr-ecs.yml. Declares secrets in workflow_call so static analysis
# recognizes AWS_DEPLOY_ROLE_ARN (fixed OIDC role — not user-supplied).

on:
  workflow_call:
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        description: OIDC assumable IAM role ARN (repository secret)
        required: true
    inputs:
      aws_region:
        type: string
        required: true
      ecr_repository:
        type: string
        required: true
      ecs_cluster:
        type: string
        required: true
      ecs_service:
        type: string
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      ECR_REPOSITORY: ${{ inputs.ecr_repository }}
      ECS_CLUSTER: ${{ inputs.ecs_cluster }}
      ECS_SERVICE: ${{ inputs.ecs_service }}
      ECS_TASK_DEFINITION: deploy/ecs/task-definition.json
      CONTAINER_NAME: linkage-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Render ECS task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
