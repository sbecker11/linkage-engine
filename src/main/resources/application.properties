spring.application.name=linkage-engine

# AWS Bedrock chat model configuration
# Credentials are resolved by the AWS SDK default provider chain
# (preferred: IAM role, or local AWS profile/session).
spring.ai.model.chat=bedrock-converse
spring.ai.bedrock.aws.region=${AWS_REGION:us-east-1}
spring.ai.bedrock.converse.chat.options.model=${BEDROCK_MODEL_ID:}

# Exclude PGVector/DataSource until DB is configured
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration