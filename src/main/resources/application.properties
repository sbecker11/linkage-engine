spring.application.name=linkage-engine

# AWS Bedrock chat model configuration
# Credentials are resolved by the AWS SDK default provider chain
# (preferred: IAM role, or local AWS profile/session).
spring.ai.model.chat=bedrock-converse
spring.ai.bedrock.aws.region=${AWS_REGION:us-east-1}
spring.ai.bedrock.converse.chat.options.model=${BEDROCK_MODEL_ID:}

# Embeddings: set SPRING_AI_MODEL_EMBEDDING=bedrock-titan (and BEDROCK_EMBEDDING_MODEL_ID) to enable hybrid vector rerank + ingest.
spring.ai.model.embedding=${SPRING_AI_MODEL_EMBEDDING:none}
spring.ai.bedrock.titan.embedding.model=${BEDROCK_EMBEDDING_MODEL_ID:amazon.titan-embed-text-v2:0}
spring.ai.bedrock.titan.embedding.input-type=TEXT
linkage.semantic.llm.enabled=${LINKAGE_SEMANTIC_LLM_ENABLED:true}

# Spring AI client retries (throttling / transient Bedrock errors)
spring.ai.retry.max-attempts=4
spring.ai.retry.backoff.initial-interval=500ms

# PostgreSQL datasource (deterministic SQL stage)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/linkage_db}
spring.datasource.username=${DB_USER:ancestry}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# We use Flyway table record_embeddings + JDBC; Spring's PgVectorStore would create a separate schema.
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

# Sprint 10 — Observability: expose actuator health + metrics endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}