spring.application.name=linkage-engine

# OpenAI API key loaded from .env (OPENAI_API_KEY) at startup
spring.ai.openai.api-key=${OPENAI_API_KEY:}

# Exclude PGVector/DataSource until DB is configured (OpenAI is enabled when api-key is set)
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration